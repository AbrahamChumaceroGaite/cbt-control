services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "4001"
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - PORT=4001
      - WEB_ORIGIN=https://control-cbt.prod.dtt.tja.ucb.edu.bo
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        - API_URL=http://api:4001
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
