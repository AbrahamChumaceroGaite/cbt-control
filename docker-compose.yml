services:
  # ── NestJS API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "4001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:/app/prisma/prod.db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - PORT=4001
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost}
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
