events {
  worker_connections 1024;
}

http {
  gzip       on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  server_tokens off;

  # Standard map for WebSocket upgrades — avoids forcing Connection: upgrade
  # on regular HTTP polling requests to the same location.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream nestjs_api {
    server api:4001;
  }

  upstream nextjs_web {
    server web:3001;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options         "SAMEORIGIN";
    add_header X-Content-Type-Options  "nosniff";
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: ws:;";

    # ── WebSocket / socket.io polling — must come before /api/ ───────────────
    location /socket.io/ {
      proxy_pass             http://nestjs_api;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade          $http_upgrade;
      proxy_set_header       Connection       $connection_upgrade;
      proxy_set_header       Host             $host;
      proxy_set_header       X-Real-IP        $remote_addr;
      proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header       Cookie           $http_cookie;
      proxy_read_timeout     3600s;
      proxy_send_timeout     3600s;
    }

    # ── NestJS API ────────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Cookie           $http_cookie;
      proxy_read_timeout 60s;
    }

    # ── Next.js static assets — long cache ───────────────────────────────────
    location /_next/static/ {
      proxy_pass       http://nextjs_web;
      proxy_set_header Host $host;
      expires          1y;
      add_header       Cache-Control "public, immutable";
    }

    # ── Next.js frontend (everything else) ───────────────────────────────────
    location / {
      proxy_pass         http://nextjs_web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade          $http_upgrade;
      proxy_set_header   Connection       $connection_upgrade;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
